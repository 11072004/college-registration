<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Registration Form</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="form.css">
</head>
<body>
    <a href="file:///C:/Users/devan/OneDrive/Desktop/VS/college.html">Move to Home Page</a>
    <div class="logo">
    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQaksCUEevyrvwCXVxK9T7hb-r9Nz6xyVWeEg&s">
    <h2>Imperial College</h2>
    </div>
    <div class="container mt-5">
        <h2 class="text-center">Address Details</h2>
        <form id="registrationForm" class="mt-4">
            <div class="form-row">
                <div class="form-group col-md-6">
                    <label for="addresses">Current Address</label>
                    <input type="text" class="form-control" id="addresses" placeholder="enter your address" required>
                </div>
                <div class="form-group col-md-6">
                    <label for="city">City</label>
                    <input type="text" class="form-control" id="city" placeholder="Enter your City Name" required>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group col-md-6">
                    <label for="State">State</label>
                    <input type="text" class="form-control" id="state" placeholder="Enter your state name" required>
                </div>
                <div class="form-group col-md-6">
                    <label for="country">Country</label>
                    <input type="text" class="form-control" id="country" placeholder="Country name" required>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group col-md-6">
                    <label for="pincode">pincode</label>
                    <input type="text" class="form-control" id="pincode" placeholder="pincode" required>
                </div>
                <div class="form-group col-md-6">
                    <label for="railway">Nearest Railway Station</label>
                    <input type="text" class="form-control" id="railway" placeholder="enter here" required>
                </div>
            </div>
            <button type="submit" class="btn btn-primary">Submit</button>
        </form>
        <div id="message" class="mt-3"></div>
    </div>
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.3/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script src="add.js"></script>
</body>
</html>
