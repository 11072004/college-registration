<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Registration Form</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="form.css">
</head>
<body>
    <a href="file:///C:/Users/devan/OneDrive/Desktop/VS/college.html">Move to Home Page</a>
    <div class="logo">
    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQaksCUEevyrvwCXVxK9T7hb-r9Nz6xyVWeEg&s">
    <h2>Imperial College</h2>
    </div>
    <div class="container mt-5">
        <h2 class="text-center">Health Details</h2>
        <form id="registrationForm" class="mt-4">
            <div class="form-row">
                <div class="form-group col-md-6">
                    <label for="height">Height</label>
                    <input type="text" class="form-control" id="height" placeholder="enter your height" required>
                </div>
                <div class="form-group col-md-6">
                    <label for="weight">Weight</label>
                    <input type="text" class="form-control" id="weight" placeholder="Enter your weight" required>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group col-md-6">
                    <label for="blood">Blood Group</label>
                    <input type="text" class="form-control" id="blood" placeholder="Enter your BloodGroup" required>
                </div>
                <div class="form-group col-md-6">
                    <label for="birthmark">Birth Mark</label>
                    <input type="text" class="form-control" id="birthmark" placeholder="BirthMark" required>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group col-md-6">
                    <label for="pwd">Person With Disability</label>
                    <input type="radio" value="Yes" name="pwd">Yes
                    <input type="radio" value="No" name="pwd">No
                </div>
            </div>
            <button type="submit" class="btn btn-primary">Submit</button>
        </form>
        <div id="message" class="mt-3"></div>
    </div>
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.3/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script src="heal.js"></script>
</body>
</html>
